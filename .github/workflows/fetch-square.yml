name: Fetch Square Sales Data

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # also allows manual trigger from GitHub UI

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Square catalog data
        env:
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
          # SQUARE_LOCATION_ID: ${{ secrets.SQUARE_LOCATION_ID }}  # uncomment if needed
        run: |
          node .github/scripts/fetch-square.js

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: update sale data [$(date -u '+%Y-%m-%d %H:%M')] [skip ci]"
          git push
