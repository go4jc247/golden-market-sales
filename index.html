<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a3a2a" />
  <meta name="description" content="Weekly sales and specials at Golden International Market — New Cumberland, PA" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Golden Market" />

  <!-- Open Graph -->
  <meta property="og:title" content="Golden International Market — Weekly Sales" />
  <meta property="og:description" content="Check out this week's specials and sale prices." />
  <meta property="og:type" content="website" />

  <title>Golden International Market — Weekly Sales</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header class="site-header">
    <div class="header-top">
      <div class="logo-area">
        <div class="logo-icon">🌍</div>
        <div class="store-name">
          <span>Weekly Sales</span>
          <span id="storeName">Golden International Market</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="install-btn" id="installBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 16l-6-6h4V4h4v6h4l-6 6z"/><path d="M4 20h16"/></svg>
          Add App
        </button>
      </div>
    </div>
    <div class="sale-banner">
      🏷️ This Week's Specials
      <span class="updated" id="updatedDate"></span>
    </div>
  </header>

  <!-- ── Category Filter ── -->
  <nav class="filter-bar" aria-label="Filter by category">
    <div class="filter-inner" id="filterInner">
      <!-- populated by JS -->
      <div class="skeleton skeleton-line" style="width:80px;height:36px;border-radius:999px"></div>
      <div class="skeleton skeleton-line" style="width:90px;height:36px;border-radius:999px"></div>
      <div class="skeleton skeleton-line" style="width:100px;height:36px;border-radius:999px"></div>
      <div class="skeleton skeleton-line" style="width:80px;height:36px;border-radius:999px"></div>
    </div>
  </nav>

  <!-- ── Main ── -->
  <main>

    <!-- Featured section -->
    <section id="featuredSection">
      <div class="section-label">⭐ Featured Deals</div>
      <div class="featured-grid" id="featuredGrid">
        <!-- skeleton placeholders -->
        <div class="skeleton-card">
          <div class="skeleton skeleton-img"></div>
          <div class="skeleton-body">
            <div class="skeleton skeleton-line"></div>
            <div class="skeleton skeleton-line short"></div>
            <div class="skeleton skeleton-line price"></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton skeleton-img"></div>
          <div class="skeleton-body">
            <div class="skeleton skeleton-line"></div>
            <div class="skeleton skeleton-line short"></div>
            <div class="skeleton skeleton-line price"></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton skeleton-img"></div>
          <div class="skeleton-body">
            <div class="skeleton skeleton-line"></div>
            <div class="skeleton skeleton-line short"></div>
            <div class="skeleton skeleton-line price"></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton skeleton-img"></div>
          <div class="skeleton-body">
            <div class="skeleton skeleton-line"></div>
            <div class="skeleton skeleton-line short"></div>
            <div class="skeleton skeleton-line price"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- All items section -->
    <section id="allSection">
      <div class="section-label"><span>More Deals</span></div>
      <div class="items-grid" id="allGrid">
        <!-- populated by JS -->
      </div>
    </section>

  </main>

  <!-- ── Reviews ── -->
  <section class="reviews-section">
    <div class="reviews-inner">
      <div class="reviews-header">
        <div>
          <h2 class="reviews-title">What Customers Say</h2>
          <div class="reviews-meta">
            <span class="google-badge">
              <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Google Reviews
            </span>
            <span class="avg-rating">★★★★★ <strong>5.0</strong></span>
          </div>
        </div>
      </div>
      <div class="reviews-grid" id="reviewsGrid">
        <!-- populated by JS -->
      </div>
    </div>
  </section>

  <!-- ── Store Info ── -->
  <footer class="store-info">
    <div class="store-info-inner">
      <div class="info-block">
        <h3>Location</h3>
        <p id="storeAddress"></p>
        <br>
        <h3>Phone</h3>
        <p id="storePhone"></p>
      </div>
      <div class="info-block">
        <h3>Store Hours</h3>
        <ul class="hours-list" id="hoursList"></ul>
      </div>
    </div>
  </footer>

  <div class="footer-bottom">
    &copy; 2026 Golden International Market. Sale prices valid while supplies last.
  </div>

  <!-- ── Offline Toast ── -->
  <div class="offline-toast" id="offlineToast">
    📵 You're offline — showing last known sales
  </div>

  <script src="app.js"></script>
</body>
</html>
